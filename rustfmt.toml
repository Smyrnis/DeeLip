edition = "2021"

# Wider line budget before rustfmt wraps anything at all.
max_width = 120

# "Max" raises every width-based heuristic (function calls, struct literals,
# array literals, chained method calls, single-line if/else) up to max_width
# instead of rustfmt's default of ~60% of it -- this is what stops a call
# like `foo(a, b, c)` or `some.chain().of().calls()` from being broken onto
# multiple lines just because it's moderately long; it now only wraps once a
# line would actually exceed max_width.
use_small_heuristics = "Max"

# Pack a wrapped parameter list as many-per-line as fit, instead of one
# parameter per line -- the other compacting knobs that would help further
# (fn_single_line, overflow_delimited_expr, imports_granularity = "Crate",
# where_single_line, blank_lines_upper_bound, empty_item_single_line) are
# all nightly-only in rustfmt and get silently ignored on stable, so this
# is the last lever stable `cargo fmt` actually has for this.
fn_params_layout = "Compressed"
