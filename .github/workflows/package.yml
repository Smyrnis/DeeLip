name: Package

# Builds distributables for Linux, Windows, and macOS, and on a version tag,
# attaches them to a GitHub Release:
#   - .deb      (Debian / Ubuntu and derivatives)
#   - .rpm      (Fedora / RHEL / openSUSE and derivatives)
#   - .AppImage (portable, runs on most distros without installing anything)
#   - .tar.gz   (plain binary + desktop file + icon, for anything else)
#   - .msi      (Windows installer, via cargo-wix)
#   - .dmg      (macOS disk image containing DeeLip.app, via cargo-bundle --
#     not code-signed/notarized yet, so Gatekeeper blocks the first launch)
#
# The Windows and macOS jobs are newer than the Linux one and haven't had a
# real Windows/macOS machine available to verify against -- see each job's
# own comments for specific, disclosed risk areas (the tray icon's
# lazy-first-frame construction in crates/ui/src/platform/tray.rs, unverified
# per its own doc comment -- crates/ui/src/frame.rs's init_lazy_tray wraps it
# in catch_unwind so a panic there can't take the whole app down silently).
#
# audiopus_sys (Opus) does NOT need autotools on windows-latest: the pinned
# audiopus_sys 0.1.8's Windows build path (gated `cfg(all(windows,
# target_env = "msvc"))`) links pre-built static libs already checked into
# the crate and never invokes a compiler at all -- the autotools/autogen.sh
# path only compiles for unix/gnu-target builds. An earlier version of this
# workflow installed a MinGW toolchain "just in case" for this dependency;
# that was based on a stale/incorrect assumption (confirmed by reading the
# actual vendored build.rs) and has been removed -- it was dead weight that
# put a MinGW gcc.exe on PATH ahead of MSVC's cl.exe for the *entire* job,
# an unnecessary risk of some other native dependency picking up the wrong
# toolchain. The "Verify MSVC toolchain" and "Check for MinGW runtime DLL
# dependencies" steps below exist specifically to keep proving this rather
# than assuming it stays true forever.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  package-linux:
    # Older glibc than "latest" for wider compatibility with distros that
    # aren't on the newest release yet.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libasound2-dev libudev-dev libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev \
            libx11-dev libxkbcommon-dev libxi-dev libxrandr-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shm0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libwayland-dev \
            libopus-dev \
            rpm
          # libopus-dev matters beyond just linking deelip itself: without it,
          # audiopus_sys builds Opus from source as a private dylib that
          # linuxdeploy's automatic dependency scan can't find on the
          # standard library search path (`ERROR: Could not find dependency:
          # libopus.so.0`, breaking the AppImage step below) -- installing
          # the dev package makes audiopus_sys link the system libopus0
          # instead, which lives at the normal /usr/lib path linuxdeploy
          # already knows to look at.

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install packaging tools
        # --force: Swatinem/rust-cache caches ~/.cargo/bin (and cargo's
        # install-tracking metadata) across runs. A real CI run showed that
        # after a cache save, the *next* run's cargo-binstall sees the
        # metadata and reports "already installed" without the binary
        # actually surviving the cache round-trip, so the packaging step
        # after it fails with "no such command". --force skips that
        # unreliable check and always (re)installs the real binary.
        run: cargo binstall --no-confirm --force cargo-deb cargo-generate-rpm

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        run: cargo build --release --locked -p deelip

      - name: Build .deb
        run: cargo deb --no-build -p deelip

      - name: Build .rpm
        run: cargo generate-rpm -p .

      - name: Build tar.gz
        run: |
          stage="deelip-${{ steps.version.outputs.version }}-x86_64-linux"
          mkdir -p "$stage/usr/bin" "$stage/usr/share/applications" "$stage/usr/share/icons/hicolor/256x256/apps"
          cp target/release/deelip "$stage/usr/bin/"
          cp packaging/deelip.desktop "$stage/usr/share/applications/"
          cp assets/icon.png "$stage/usr/share/icons/hicolor/256x256/apps/deelip.png"
          # install/uninstall/health-check live directly under scripts/ --
          # bundle it so a standalone tar.gz download is self-contained, not
          # just a git checkout.
          cp -r scripts "$stage/"
          tar czf "$stage.tar.gz" "$stage"

      - name: Build AppImage
        env:
          ARCH: x86_64
        run: |
          wget -q -O linuxdeploy.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O appimagetool.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy.AppImage appimagetool.AppImage

          mkdir -p AppDir/usr/bin
          cp target/release/deelip AppDir/usr/bin/
          cp packaging/deelip.desktop AppDir/
          cp assets/icon.png AppDir/deelip.png

          # GitHub Actions runners have no FUSE, so extract-and-run instead
          # of mounting the AppImages directly.
          ./linuxdeploy.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --executable AppDir/usr/bin/deelip \
            --desktop-file AppDir/deelip.desktop \
            --icon-file AppDir/deelip.png \
            --output appimage
          ./appimagetool.AppImage --appimage-extract-and-run AppDir \
            "deelip-${{ steps.version.outputs.version }}-x86_64.AppImage"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/
          cp ./*.tar.gz dist/
          cp ./*.AppImage dist/

      - name: Checksum artifacts
        # Lets the in-app updater (crates/updater) verify a downloaded
        # .tar.gz before installing it in place of the running binary --
        # see download_and_replace's doc comment.
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: deelip-linux-packages
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Explicit, not just relying on the runner's default -- this is
          # what makes audiopus_sys skip its autotools path entirely (see
          # the top-of-file comment) and link its pre-built MSVC static libs
          # instead.
          target: x86_64-pc-windows-msvc

      # Puts cl.exe/dumpbin.exe (the real MSVC toolchain) on PATH for every
      # later step in this job, including the two diagnostic steps below --
      # not required for `cargo build` itself (the `cc` crate already
      # locates MSVC via vswhere on its own), but needed for `dumpbin` and
      # gives the diagnostics a definitive "what's actually on PATH" answer.
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      # Confirms the "no gcc.exe on PATH" assumption this job now depends on
      # (see the top-of-file comment) instead of silently trusting it --
      # fails loudly if a stray gcc ever ends up ahead of cl.exe on PATH,
      # which is exactly the condition that could make a native dependency's
      # build script pick the wrong toolchain.
      - name: Verify MSVC toolchain resolves correctly
        shell: pwsh
        run: |
          $cl = Get-Command cl -ErrorAction SilentlyContinue
          $gcc = Get-Command gcc -ErrorAction SilentlyContinue
          Write-Host "cl.exe:  $($cl.Source)"
          Write-Host "gcc.exe: $($gcc.Source)"
          if (-not $cl) {
            Write-Error "cl.exe not found on PATH -- MSVC toolchain setup did not work as expected."
            exit 1
          }
          if ($gcc) {
            Write-Error "gcc.exe found on PATH ($($gcc.Source)) -- a native dependency's build script could pick this up instead of cl.exe. Investigate before proceeding."
            exit 1
          }

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-wix
        # --force: see the "Install packaging tools" comment in the Linux
        # job -- Swatinem/rust-cache + cargo-binstall's "already installed"
        # check can falsely skip installing a binary that didn't actually
        # survive the cache round-trip.
        shell: bash
        run: cargo binstall --no-confirm --force cargo-wix
        # WiX Toolset itself needs no separate install step -- windows-latest
        # already ships the Legacy v3.14.1 variant cargo-wix expects.

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        run: cargo build --release --locked -p deelip

      # If anything in the dependency graph ever does pick up a MinGW
      # toolchain by mistake, this is what that mistake actually looks like
      # to an end user: deelip.exe silently failing to start on a stock
      # Windows machine because a MinGW runtime DLL it depends on isn't
      # present. Catch it here, at build time, not via a user's bug report.
      - name: Check for MinGW runtime DLL dependencies
        shell: pwsh
        run: |
          $deps = dumpbin /dependents target\release\deelip.exe | Out-String
          Write-Host $deps
          $mingwDlls = @('libgcc_s_seh', 'libwinpthread', 'libstdc++')
          $found = $mingwDlls | Where-Object { $deps -match $_ }
          if ($found) {
            Write-Error "deelip.exe depends on MinGW runtime DLL(s): $($found -join ', '). These are not present on a normal Windows machine and the app will fail to launch. See this workflow's top-of-file comment."
            exit 1
          }
          Write-Host "No MinGW runtime DLL dependencies found."

      - name: Build MSI installer
        shell: bash
        run: cargo wix -p deelip --nocapture --no-build --target-bin-dir target/release

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/wix/*.msi "dist/deelip-${{ steps.version.outputs.version }}-x86_64.msi"

      - name: Checksum artifacts
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: deelip-windows-package
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Same rationale as the Windows job's MSYS2 step -- audiopus_sys
      # builds Opus via autotools, which isn't guaranteed present on a
      # default macos-latest image the way it is on GitHub's Ubuntu images.
      # Cheap no-op if Homebrew already has current versions.
      - name: Install autotools (for audiopus_sys/Opus)
        run: brew install autoconf automake libtool

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-bundle
        # --force: see the "Install packaging tools" comment in the Linux
        # job -- Swatinem/rust-cache + cargo-binstall's "already installed"
        # check can falsely skip installing a binary that didn't actually
        # survive the cache round-trip.
        run: cargo binstall --no-confirm --force cargo-bundle

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2)" >> "$GITHUB_OUTPUT"
          fi

      # `--format dmg` builds the .app bundle first, then wraps it in a DMG
      # -- one command produces both (see Cargo.toml's
      # `[package.metadata.bundle]` section for the .app's own metadata).
      - name: Build .app and .dmg
        run: cargo bundle -p deelip --release --format dmg

      - name: Collect artifacts
        run: |
          mkdir -p dist
          # The .app lands under bundle/osx/, but the final .dmg cargo-bundle
          # produces from it lands in a sibling bundle/dmg/ directory, not
          # bundle/osx/ -- confirmed by an actual CI run, not assumed.
          cp target/release/bundle/dmg/*.dmg "dist/deelip-${{ steps.version.outputs.version }}-x86_64.dmg"

      - name: Checksum artifacts
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: deelip-macos-package
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
